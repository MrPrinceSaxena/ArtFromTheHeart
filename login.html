<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ArtfromTheHeart</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>ArtfromTheHeart</h1>
                <p>Admin Panel Login</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="login-button">Login</button>
            </form>
            
            <div class="login-footer">
                <a href="index.html" class="back-link">← Back to Site</a>
            </div>
        </div>
    </div>
    
    <script>
        // Prevent redirect flicker - only check session after page is fully loaded
        window.addEventListener('load', function() {
            // Small delay to ensure page is stable
            setTimeout(function() {
                const SESSION_KEY = 'artfromtheheart_admin_session';
                const session = localStorage.getItem(SESSION_KEY);
                if (session) {
                    try {
                        const sessionData = JSON.parse(session);
                        const now = new Date().getTime();
                        // Check if session is still valid (24 hours)
                        if (now - sessionData.timestamp < 24 * 60 * 60 * 1000) {
                            // Session valid, redirect to admin
                            window.location.href = 'admin.html';
                        } else {
                            // Session expired, clear it
                            localStorage.removeItem(SESSION_KEY);
                        }
                    } catch (e) {
                        // Invalid session data, clear it
                        localStorage.removeItem(SESSION_KEY);
                    }
                }
            }, 300);
        });
    </script>
    <script src="login.js"></script>
</body>
</html>
